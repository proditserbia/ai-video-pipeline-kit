# =============================================================================
# TEMPORARY HTTP-only config for avpk.prodit.rs
# Use this BEFORE running certbot so nginx can start without SSL certificates.
#
# Steps:
#   1. sudo cp nginx/avpk.prodit.rs.http-only.conf \
#             /etc/nginx/sites-available/avpk.prodit.rs
#      sudo ln -sf /etc/nginx/sites-available/avpk.prodit.rs \
#                  /etc/nginx/sites-enabled/avpk.prodit.rs
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo certbot --nginx -d avpk.prodit.rs
#   4. Replace with avpk.prodit.rs.conf (the full HTTPS config) and reload.
#
# See nginx/setup-ssl.sh for the automated end-to-end procedure.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name avpk.prodit.rs;

    # Allow Let's Encrypt ACME challenge over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to the Next.js frontend during bootstrap
    location / {
        proxy_pass              http://127.0.0.1:3000;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
