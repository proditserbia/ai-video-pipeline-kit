# =============================================================================
# Nginx site config for avpk.prodit.rs
# AI Video Pipeline Kit — production reverse proxy with SSL (Let's Encrypt)
# =============================================================================
#
# FIRST-TIME SETUP — use the automated script:
#   sudo bash nginx/setup-ssl.sh
#
# The script performs a safe 2-step bootstrap:
#   1. Deploys avpk.prodit.rs.http-only.conf (no SSL paths) so nginx starts.
#   2. Runs certbot to issue the certificate.
#   3. Deploys this file (avpk.prodit.rs.conf) with full HTTPS.
#
# Manual prerequisites (if NOT using the script):
#   sudo cp nginx/http-extras.conf /etc/nginx/conf.d/avpk-extras.conf
#   # Deploy HTTP-only config first, validate, then run certbot:
#   sudo cp nginx/avpk.prodit.rs.http-only.conf \
#             /etc/nginx/sites-available/avpk.prodit.rs
#   sudo ln -sf /etc/nginx/sites-available/avpk.prodit.rs \
#               /etc/nginx/sites-enabled/avpk.prodit.rs
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d avpk.prodit.rs
#   # Then install this HTTPS config:
#   sudo cp nginx/avpk.prodit.rs.conf /etc/nginx/sites-available/avpk.prodit.rs
#   sudo nginx -t && sudo systemctl reload nginx
#
# The $connection_upgrade variable and rate-limit zones are defined in
# /etc/nginx/conf.d/avpk-extras.conf (http-extras.conf in this repo).
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name avpk.prodit.rs;

    # Allow Let's Encrypt ACME challenge over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name avpk.prodit.rs;

    # ------------------------------------------------------------------
    # SSL — managed by Certbot (paths updated automatically after issuance)
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/avpk.prodit.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avpk.prodit.rs/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ------------------------------------------------------------------
    # Upload / request size
    # ------------------------------------------------------------------
    client_max_body_size 500M;
    client_body_timeout  300s;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    proxy_connect_timeout 10s;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ------------------------------------------------------------------
    # Shared proxy headers (used by both upstreams)
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # WebSocket upgrade support ($connection_upgrade defined in avpk-extras.conf)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ------------------------------------------------------------------
    # /api  ->  FastAPI backend (port 8000)
    # ------------------------------------------------------------------
    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_cache_bypass $http_upgrade;
    }

    # Health endpoint (no rate limit for monitoring tools)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ------------------------------------------------------------------
    # /  ->  Next.js frontend (port 3000)
    # ------------------------------------------------------------------
    location / {
        limit_req zone=general_limit burst=100 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
    }
}
