# =============================================================================
# Nginx configuration for avpk.prodit.rs
# AI Video Pipeline Kit — production reverse proxy with SSL (Let's Encrypt)
# =============================================================================
# Install: sudo cp avpk.prodit.rs.conf /etc/nginx/sites-available/avpk.prodit.rs
#          sudo ln -s /etc/nginx/sites-available/avpk.prodit.rs \
#                     /etc/nginx/sites-enabled/avpk.prodit.rs
# =============================================================================

# ---------------------------------------------------------------------------
# Rate-limiting zones (defined in http context — place in nginx.conf if this
# file is loaded as a sites-available snippet; keep here for self-containedness
# when using include in the http block).
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name avpk.prodit.rs;

    # Allow Let's Encrypt ACME challenge over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name avpk.prodit.rs;

    # ------------------------------------------------------------------
    # SSL — managed by Certbot (paths updated automatically after issuance)
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/avpk.prodit.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avpk.prodit.rs/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ------------------------------------------------------------------
    # Upload / request size
    # ------------------------------------------------------------------
    client_max_body_size 500M;
    client_body_timeout  300s;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    proxy_connect_timeout 10s;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ------------------------------------------------------------------
    # Shared proxy headers (used by both upstreams)
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # WebSocket upgrade support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ------------------------------------------------------------------
    # /api  →  FastAPI backend (port 8000)
    # ------------------------------------------------------------------
    location /api {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;

        # Strip /api prefix so FastAPI receives paths as-is
        # (FastAPI mounts routes at /api already — see backend/app/main.py)
        # If your FastAPI routes do NOT include the /api prefix, use:
        #   rewrite ^/api(/.*)$ $1 break;
    }

    # Health endpoint (no rate limit for monitoring tools)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ------------------------------------------------------------------
    # /  →  Next.js frontend (port 3000)
    # ------------------------------------------------------------------
    location / {
        limit_req zone=general_limit burst=100 nodelay;

        proxy_pass http://127.0.0.1:3000;

        # Next.js HMR / dev websockets (safe to keep for prod too)
        proxy_cache_bypass $http_upgrade;
    }
}

# ---------------------------------------------------------------------------
# WebSocket upgrade map — place in http context (nginx.conf) if not already
# present.  Duplicated here for completeness; nginx ignores duplicate maps.
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}
