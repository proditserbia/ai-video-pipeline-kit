# =============================================================================
# Nginx http-context extras for avpk.prodit.rs
# WebSocket upgrade map + rate-limit zones
# =============================================================================
# Install: sudo cp nginx/http-extras.conf /etc/nginx/conf.d/avpk-extras.conf
# These directives MUST live in the http { } block (not inside a server block).
# =============================================================================

# WebSocket upgrade support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Rate-limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;
